<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0d1117;font-family:'Inter',sans-serif;}
  .card{width:420px;background:#161b22;border:1px solid #30363d;border-radius:16px;padding:32px;box-shadow:0 16px 48px rgba(0,0,0,0.4);}
  h1{color:#e6edf3;font-size:22px;margin-bottom:6px;}
  .sub{color:#7d8590;font-size:13px;margin-bottom:28px;}
  .output{background:#0d1117;border:1px solid #30363d;border-radius:10px;padding:16px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;}
  .pwd{flex:1;font-family:'JetBrains Mono';font-size:16px;color:#58a6ff;word-break:break-all;letter-spacing:1px;}
  .copy-btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;white-space:nowrap;transition:all 0.2s;}
  .copy-btn:hover{background:#30363d;}
  .copy-btn.copied{background:#1f6feb;border-color:#1f6feb;color:#fff;}
  .strength{margin-bottom:20px;}
  .strength-label{display:flex;justify-content:space-between;margin-bottom:8px;}
  .strength-label span{font-size:12px;color:#7d8590;}
  .strength-label .val{font-weight:600;}
  .strength-bar{height:6px;background:#21262d;border-radius:3px;overflow:hidden;}
  .strength-fill{height:100%;border-radius:3px;transition:all 0.3s;}
  .section{margin-bottom:20px;}
  .section label{display:flex;justify-content:space-between;align-items:center;color:#e6edf3;font-size:14px;margin-bottom:10px;}
  .section label span{color:#58a6ff;font-weight:600;}
  input[type=range]{width:100%;accent-color:#58a6ff;cursor:pointer;}
  .toggles{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;}
  .toggle{display:flex;align-items:center;gap:10px;background:#21262d;border:1px solid #30363d;border-radius:8px;padding:12px;cursor:pointer;transition:all 0.2s;}
  .toggle input{display:none;}
  .toggle-box{width:18px;height:18px;border:2px solid #484f58;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
  .toggle input:checked~.toggle-box{background:#1f6feb;border-color:#1f6feb;}
  .toggle input:checked~.toggle-box::after{content:'✓';color:#fff;font-size:11px;font-weight:bold;}
  .toggle-label{color:#c9d1d9;font-size:13px;}
  .gen-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1f6feb,#0d4fcc);color:#fff;border:none;border-radius:10px;font-family:'Inter';font-size:15px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
  .gen-btn:hover{opacity:0.9;}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Password Generator</h1>
  <p class="sub">Generate strong, secure passwords instantly.</p>
  <div class="output">
    <div class="pwd" id="pwd">Click Generate</div>
    <button class="copy-btn" id="copyBtn" onclick="copy()">Copy</button>
  </div>
  <div class="strength">
    <div class="strength-label"><span>Strength</span><span class="val" id="strengthLabel">—</span></div>
    <div class="strength-bar"><div class="strength-fill" id="strengthBar" style="width:0%"></div></div>
  </div>
  <div class="section">
    <label>Password Length <span id="lenVal">16</span></label>
    <input type="range" id="length" min="6" max="64" value="16" oninput="document.getElementById('lenVal').textContent=this.value;generate()">
  </div>
  <div class="toggles">
    <label class="toggle"><input type="checkbox" id="upper" checked onchange="generate()"><div class="toggle-box"></div><span class="toggle-label">Uppercase</span></label>
    <label class="toggle"><input type="checkbox" id="lower" checked onchange="generate()"><div class="toggle-box"></div><span class="toggle-label">Lowercase</span></label>
    <label class="toggle"><input type="checkbox" id="numbers" checked onchange="generate()"><div class="toggle-box"></div><span class="toggle-label">Numbers</span></label>
    <label class="toggle"><input type="checkbox" id="symbols" onchange="generate()"><div class="toggle-box"></div><span class="toggle-label">Symbols</span></label>
  </div>
  <button class="gen-btn" onclick="generate()">⚡ Generate Password</button>
</div>
<script>
  function generate(){
    let chars='';
    if(document.getElementById('upper').checked)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    if(document.getElementById('lower').checked)chars+='abcdefghijklmnopqrstuvwxyz';
    if(document.getElementById('numbers').checked)chars+='0123456789';
    if(document.getElementById('symbols').checked)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';
    if(!chars){document.getElementById('pwd').textContent='Select at least one option';return;}
    const len=parseInt(document.getElementById('length').value);
    let pwd='';
    for(let i=0;i<len;i++)pwd+=chars[Math.floor(Math.random()*chars.length)];
    document.getElementById('pwd').textContent=pwd;
    updateStrength(pwd);
  }
  function updateStrength(pwd){
    let score=0;
    if(pwd.length>=8)score++;if(pwd.length>=16)score++;
    if(/[A-Z]/.test(pwd))score++;if(/[a-z]/.test(pwd))score++;
    if(/[0-9]/.test(pwd))score++;if(/[^A-Za-z0-9]/.test(pwd))score++;
    const levels=[{l:'Too Weak',c:'#f85149',w:15},{l:'Weak',c:'#ff9500',w:35},{l:'Fair',c:'#f0c030',w:55},{l:'Good',c:'#3fb950',w:75},{l:'Strong',c:'#238636',w:90},{l:'Very Strong',c:'#00d084',w:100}];
    const s=levels[Math.min(score,5)];
    document.getElementById('strengthLabel').textContent=s.l;
    document.getElementById('strengthLabel').style.color=s.c;
    document.getElementById('strengthBar').style.width=s.w+'%';
    document.getElementById('strengthBar').style.background=s.c;
  }
  function copy(){
    const pwd=document.getElementById('pwd').textContent;
    navigator.clipboard.writeText(pwd);
    const btn=document.getElementById('copyBtn');
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  }
  generate();
</script>
</body>
</html>
